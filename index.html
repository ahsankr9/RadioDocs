let currentBTS = 'malek';
let globalSearchActive = false;

function selectBTS(btn, id) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    btn.classList.add('active');
    currentBTS = id;
    document.getElementById('clientSearch').value = '';
    globalSearchActive = false;
    renderClientPanel(id);
    showWelcome();
}

function renderClientPanel(id) {
    const bts = btsData[id];
    document.getElementById('panel-bts-name').textContent = bts.name.toUpperCase();
    document.getElementById('panel-count').textContent = bts.clients.length + ' CLIENT' + (bts.clients.length !== 1 ? 'S' : '');
    renderCards(bts.clients, id);
}

function renderCards(clientsArray, originBtsId = currentBTS) {
    const list = document.getElementById('clientList');
    if (!clientsArray.length) {
        list.innerHTML = `<div class="client-empty"><div class="client-empty-icon">🔍</div><div class="client-empty-text">No clients found</div></div>`;
        return;
    }
    list.innerHTML = clientsArray.map((c, i) => {
        return `<div class="client-card" data-bts="${originBtsId}" data-index="${i}" onclick="selectClientGlobal(this, '${originBtsId}', ${i})">
            <div class="client-name">${c.name}</div>
            <div class="client-meta">
                <span class="client-tag ${c.linktype.toLowerCase()}">${c.linktype}</span>
                <span class="client-ip">${c.apip}</span>
            </div>
            <span class="client-arrow">›</span>
        </div>`;
    }).join('');
}

function globalSearchClients() {
    const q = document.getElementById('clientSearch').value.toLowerCase().trim();
    if (q === '') {
        globalSearchActive = false;
        renderClientPanel(currentBTS);
        return;
    }

    globalSearchActive = true;
    let allMatches = [];
    for (let [btsId, bts] of Object.entries(btsData)) {
        bts.clients.forEach(client => {
            if (client.name.toLowerCase().includes(q)) {
                allMatches.push({ client, btsId, btsName: bts.name });
            }
        });
    }

    document.getElementById('panel-bts-name').textContent = 'ALL BTS · GLOBAL';
    document.getElementById('panel-count').textContent = allMatches.length + ' RESULT' + (allMatches.length !== 1 ? 'S' : '');

    const list = document.getElementById('clientList');
    if (!allMatches.length) {
        list.innerHTML = `<div class="client-empty"><div class="client-empty-icon">🔍</div><div class="client-empty-text">No matches across BTS</div></div>`;
        return;
    }

    list.innerHTML = allMatches.map((match, idx) => {
        const clientIdx = btsData[match.btsId].clients.indexOf(match.client);
        return `<div class="client-card" data-bts="${match.btsId}" data-global-idx="${idx}" onclick="selectClientGlobal(this, '${match.btsId}', ${clientIdx})">
            <div class="client-name">${match.client.name}</div>
            <div class="client-meta">
                <span class="client-tag ${match.client.linktype.toLowerCase()}">${match.client.linktype}</span>
                <span class="client-ip">${match.client.apip}</span>
                <span style="margin-left:auto; font-size:8px; color:var(--accent); background:rgba(26,127,203,0.08); padding:2px 6px; border-radius:12px;">${match.btsName}</span>
            </div>
            <span class="client-arrow">›</span>
        </div>`;
    }).join('');
}

function selectClientGlobal(element, btsId, clientIdx) {
    document.querySelectorAll('.client-card').forEach(c => c.classList.remove('active'));
    element.classList.add('active');
    const client = btsData[btsId].clients[clientIdx];
    showDetail(client, btsData[btsId].name);
}

function showWelcome() {
    document.getElementById('detailBody').innerHTML = `
        <div class="detail-welcome">
            <div class="detail-welcome-icon">📡</div>
            <div class="detail-welcome-title">Select a Client</div>
        </div>`;
}

function v(val, isIp) {
    if (!val || val === 'N/A') return `<span class="na-val">N/A</span>`;
    return isIp ? `<span class="ip-val">${val}</span>` : val;
}

function showDetail(c, btsName) {
    const lt = c.linktype.toLowerCase();
    const vlan = (c.vlan && c.vlan !== 'N/A') ? `<span class="vlan-chip">${c.vlan}</span>` : `<span class="na-val">N/A</span>`;

    document.getElementById('detailBody').innerHTML = `
        <div class="detail-card">
            <div class="dc-header">
                <div>
                    <div class="dc-client-name">${c.name}</div>
                    <div class="dc-bts-label">${btsName}</div>
                </div>
                <span class="dc-link-badge ${lt}">${c.linktype}</span>
            </div>
            <div class="dc-table">
                <div class="dc-cell lbl-wide">SW IP &amp; Port</div>
                <div class="dc-cell val-wide">${v(c.swip, true)}</div>

                <div class="dc-cell lbl">Radio IP (AP)</div>
                <div class="dc-cell val">${v(c.apip, true)}</div>
                <div class="dc-cell lbl">Radio IP (CP)</div>
                <div class="dc-cell val">${v(c.cpip, true)}</div>

                <div class="dc-cell lbl">Radio Name</div>
                <div class="dc-cell val">${v(c.radioname)}</div>
                <div class="dc-cell lbl">SSID</div>
                <div class="dc-cell val">${v(c.ssid)}</div>

                <div class="dc-cell lbl">Channel Width</div>
                <div class="dc-cell val">${v(c.chwidth)}</div>
                <div class="dc-cell lbl">Frequency</div>
                <div class="dc-cell val">${v(c.freq)}</div>

                <div class="dc-cell lbl">Key</div>
                <div class="dc-cell val">${v(c.key)}</div>
                <div class="dc-cell lbl">VLAN</div>
                <div class="dc-cell val">${vlan}</div>
            </div>
        </div>`;
}
